{% extends "layout_public.html" %}
{% block title %}Assinatura | ZapAction{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
    <div class="p-6 border-b border-slate-100">
      <h1 class="text-xl font-bold text-slate-800">Ativar assinatura</h1>
      <p class="text-sm text-slate-500 mt-1">Sua conta está sem assinatura ativa. Entre no painel para concluir o checkout.</p>
    </div>
    <div class="p-6 space-y-3">
      <a href="{{ PUBLIC_BASE_URL }}/login" class="inline-flex w-full items-center justify-center gap-2 px-4 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold transition">
        Entrar no painel
        <i class="fas fa-arrow-right"></i>
      </a>
      <a href="{{ url_for('public.precos') }}" class="inline-flex w-full items-center justify-center gap-2 px-4 py-3 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold transition">
        Ver planos
      </a>
    </div>
  </div>
</div>
{% endblock %}
