{% extends "layout_public.html" %}
{% block title %}Criar conta | ZapAction{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
    <div class="p-6 border-b border-slate-100">
      <h1 class="text-xl font-bold text-slate-800">Criar conta</h1>
      <p class="text-sm text-slate-500 mt-1">
        Plano: <span class="font-semibold text-slate-700">{{ (plan.name if plan else plan_key) or plan_key }}</span>
      </p>
    </div>

    <form method="post" action="{{ url_for('public.cadastro_post') }}" class="p-6 space-y-4">
      <input type="hidden" name="plano" value="{{ plan_key }}">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nome (opcional)</label>
        <input name="nome" value="{{ nome or '' }}" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Seu nome">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
        <input type="email" name="email" value="{{ email or '' }}" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="voce@empresa.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
        <div class="relative">
          <input type="password" id="cad-pass" name="senha" required minlength="6" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none pr-12" placeholder="Mínimo 6 caracteres">
          <button type="button" class="toggle-pass absolute inset-y-0 right-0 flex items-center px-4 text-slate-500 hover:text-slate-700" aria-label="Mostrar senha" data-target="cad-pass">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar senha</label>
        <div class="relative">
          <input type="password" id="cad-pass2" name="senha2" required minlength="6" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none pr-12" placeholder="Repita a senha">
          <button type="button" class="toggle-pass absolute inset-y-0 right-0 flex items-center px-4 text-slate-500 hover:text-slate-700" aria-label="Mostrar senha" data-target="cad-pass2">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      {% if mensagem %}
      <div class="p-3 rounded-xl text-sm {{ 'bg-red-50 text-red-700' if erro else 'bg-emerald-50 text-emerald-700' }}">
        {{ mensagem }}
      </div>
      {% endif %}

      <button type="submit" class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold transition">
        Criar conta e iniciar teste
      </button>
      <div class="text-xs text-slate-500 text-center">
        Ao criar a conta, você aceita os <a class="underline" href="{{ url_for('legal.termos') }}">Termos</a> e a <a class="underline" href="{{ url_for('legal.politica') }}">Política</a>.
      </div>
    </form>
  </div>
</div>
{% endblock %}
